<div
  cdkOverlayOrigin
  #trigger="cdkOverlayOrigin"
  (click)="toggleDropdown()"
  class="relative flex flex-col w-full max-w-[300px] p-3 bg-white border border-gray-200 rounded-xl cursor-pointer hover:border-emerald-400 transition-all shadow-sm group"
>
  <span class="text-[10px] uppercase tracking-wider font-bold text-emerald-600 mb-1 leading-none">
    {{ label() }}
  </span>

  <div class="flex items-center gap-3">
    <div class="flex-shrink-0">
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="currentColor"
        class="text-emerald-500 rotate-45 group-hover:scale-110 transition-transform"
      >
        <path d="M3.4,20.6,21,12,3.4,3.4V10.3l10.3,1.7L3.4,13.7Z" />
      </svg>
    </div>

    <span
      class="text-lg font-semibold truncate"
      [class.text-slate-400]="!selectedLabel()"
      [class.text-slate-700]="selectedLabel()"
    >
      {{ selectedLabel() || placeholder() }}
    </span>
  </div>
</div>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="isOpen()"
  [cdkConnectedOverlayHasBackdrop]="true"
  backdropClass="cdk-overlay-transparent-backdrop"
  (detach)="isOpen.set(false)"
  (backdropClick)="isOpen.set(false)"
>
  <div
    class="mt-2 w-[300px] bg-white border border-gray-100 rounded-xl shadow-2xl ring-1 ring-black/5 overflow-hidden animate-in fade-in zoom-in duration-150"
  >
    <div class="p-2 border-b border-gray-50 bg-gray-50/50">
      <input
        #searchInput
        type="text"
        class="w-full px-3 py-2 text-sm bg-white border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all"
        [placeholder]="'Search ' + label() + '...'"
        [ngModel]="searchTerm()"
        (ngModelChange)="searchTerm.set($event)"
        (click)="$event.stopPropagation()"
      />
    </div>

    <ul class="max-h-[280px] overflow-y-auto py-1 custom-scrollbar">
      @for (opt of filteredOptions(); track opt.id) {
        <li
          (click)="selectOption(opt)"
          class="px-4 py-3 text-sm text-gray-700 hover:bg-emerald-50 hover:text-emerald-700 cursor-pointer transition-colors flex items-center justify-between group"
        >
          <span>{{ opt.label }}</span>
          @if (selectedLabel() === opt.label) {
            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
          }
        </li>
      } @empty {
        <li class="px-4 py-10 text-center text-sm text-gray-400">
          No results for "{{ searchTerm() }}"
        </li>
      }
    </ul>
  </div>
</ng-template>
